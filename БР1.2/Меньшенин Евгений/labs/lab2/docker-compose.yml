services:
  kafka:
    image: apache/kafka:3.9.0
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  auth-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d auth_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  restaurant-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: restaurant_db
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d restaurant_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  availability-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: availability_db
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d availability_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  booking-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d booking_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  feedback-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: feedback_db
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d feedback_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  identity-service:
    build:
      context: .
      dockerfile: identity-service/Dockerfile
    image: ${IMAGE_REGISTRY}/${IMAGE_OWNER}/lab2-identity-service:${IMAGE_TAG}
    pull_policy: always
    restart: unless-stopped
    environment:
      SERVICE_NAME: identity-service
      DATABASE_URL: jdbc:postgresql://auth-db:5432/auth_db
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_TOKEN: ${SERVICE_TOKEN}
    depends_on:
      auth-db:
        condition: service_healthy

  restaurant-service:
    build:
      context: .
      dockerfile: restaurant-service/Dockerfile
    image: ${IMAGE_REGISTRY}/${IMAGE_OWNER}/lab2-restaurant-service:${IMAGE_TAG}
    pull_policy: always
    restart: unless-stopped
    environment:
      SERVICE_NAME: restaurant-service
      DATABASE_URL: jdbc:postgresql://restaurant-db:5432/restaurant_db
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      SERVICE_TOKEN: ${SERVICE_TOKEN}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      restaurant-db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  availability-service:
    build:
      context: .
      dockerfile: availability-service/Dockerfile
    image: ${IMAGE_REGISTRY}/${IMAGE_OWNER}/lab2-availability-service:${IMAGE_TAG}
    pull_policy: always
    restart: unless-stopped
    environment:
      SERVICE_NAME: availability-service
      DATABASE_URL: jdbc:postgresql://availability-db:5432/availability_db
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      SERVICE_TOKEN: ${SERVICE_TOKEN}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RESTAURANT_SERVICE_URL: http://restaurant-service:8082
    depends_on:
      availability-db:
        condition: service_healthy
      restaurant-service:
        condition: service_started
      kafka:
        condition: service_healthy

  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    image: ${IMAGE_REGISTRY}/${IMAGE_OWNER}/lab2-booking-service:${IMAGE_TAG}
    pull_policy: always
    restart: unless-stopped
    environment:
      SERVICE_NAME: booking-service
      DATABASE_URL: jdbc:postgresql://booking-db:5432/booking_db
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      SERVICE_TOKEN: ${SERVICE_TOKEN}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      IDENTITY_SERVICE_URL: http://identity-service:8081
      RESTAURANT_SERVICE_URL: http://restaurant-service:8082
      AVAILABILITY_SERVICE_URL: http://availability-service:8083
    depends_on:
      booking-db:
        condition: service_healthy
      identity-service:
        condition: service_started
      restaurant-service:
        condition: service_started
      availability-service:
        condition: service_started
      kafka:
        condition: service_healthy

  feedback-service:
    build:
      context: .
      dockerfile: feedback-service/Dockerfile
    image: ${IMAGE_REGISTRY}/${IMAGE_OWNER}/lab2-feedback-service:${IMAGE_TAG}
    pull_policy: always
    restart: unless-stopped
    environment:
      SERVICE_NAME: feedback-service
      DATABASE_URL: jdbc:postgresql://feedback-db:5432/feedback_db
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      SERVICE_TOKEN: ${SERVICE_TOKEN}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      IDENTITY_SERVICE_URL: http://identity-service:8081
      RESTAURANT_SERVICE_URL: http://restaurant-service:8082
    depends_on:
      feedback-db:
        condition: service_healthy
      identity-service:
        condition: service_started
      restaurant-service:
        condition: service_started
      kafka:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: ${IMAGE_REGISTRY}/${IMAGE_OWNER}/lab2-api-gateway:${IMAGE_TAG}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      IDENTITY_SERVICE_URL: http://identity-service:8081
      RESTAURANT_SERVICE_URL: http://restaurant-service:8082
      AVAILABILITY_SERVICE_URL: http://availability-service:8083
      BOOKING_SERVICE_URL: http://booking-service:8084
      FEEDBACK_SERVICE_URL: http://feedback-service:8085
    depends_on:
      - identity-service
      - restaurant-service
      - availability-service
      - booking-service
      - feedback-service
